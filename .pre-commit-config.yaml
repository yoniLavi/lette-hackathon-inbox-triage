repos:
  - repo: local
    hooks:
      - id: typescript-check
        name: TypeScript type check
        entry: bash -c 'pnpm -r typecheck && npx tsc --noEmit'
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$

      - id: knip
        name: knip (unused files / deps / exports)
        entry: bash -c 'pnpm -s knip'
        language: system
        pass_filenames: false
        files: \.(ts|tsx|mjs|cjs|js|jsx|json)$

      - id: integration-tests
        name: Integration tests (CRM + agent API)
        entry: bash -c 'pnpm vitest run tests/crm-api.test.ts tests/agent-api.test.ts'
        language: system
        pass_filenames: false
        stages: [manual]
        files: \.(ts|tsx|json|yaml|sh)$

      - id: e2e-tests
        name: E2E Playwright tests (fast subset)
        entry: bash -c 'pnpm vitest run tests/frontend-e2e.test.ts'
        language: system
        pass_filenames: false
        stages: [manual]
        files: \.(ts|tsx|css|json|yaml|sh)$
