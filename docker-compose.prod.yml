# Production/deployment compose — no bind mounts, all code baked into images.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# The agent and frontend containers use their Dockerfiles as-is (no host mounts).

services:
  agent:
    volumes: []  # override dev bind mounts — use baked-in code

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start"
    volumes: []  # override dev bind mounts
