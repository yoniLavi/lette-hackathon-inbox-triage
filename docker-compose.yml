services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  crm-api:
    build:
      context: .
      dockerfile: packages/crm-api/Dockerfile
    command: pnpm --filter @repo/crm-api dev
    environment:
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crm
    ports:
      - "8002:8002"
    volumes:
      - ./packages/crm-schema/src:/app/packages/crm-schema/src
      - ./packages/crm-schema/drizzle:/app/packages/crm-schema/drizzle
      - ./packages/crm-api/src:/app/packages/crm-api/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  clawling:
    build: ./clawling
    environment:
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK}
      AWS_REGION: ${AWS_REGION}
      CRM_API_URL: http://crm-api:8002
      CLAWLING_CONFIG: /app/config.json
    volumes:
      - ./clawling/src:/app/src
      - ./clawling/config.json:/app/config.json
      - ./clawling/skills:/app/skills
      - ./clawling/entrypoint.sh:/app/entrypoint.sh
      - ./agent-workspace:/workspace
      - ./packages/crm-cli:/opt/crm-cli
    ports:
      - "8001:8001"
    depends_on:
      - crm-api
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_AGENT_URL: http://localhost:8001
      CRM_API_URL: http://crm-api:8002
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - crm-api
      - clawling
    restart: unless-stopped

volumes:
  postgres-data:
  frontend-node-modules:
