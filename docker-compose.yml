services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  crm-api:
    build: ./crm
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://crm:crm@postgres:5432/crm
    ports:
      - "8002:8002"
    volumes:
      - ./crm/main.py:/app/main.py
      - ./crm/models.py:/app/models.py
      - ./crm/database.py:/app/database.py
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build: ./agent
    environment:
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK}
      AWS_REGION: ${AWS_REGION}
      CRM_API_URL: http://crm-api:8002
    volumes:
      - ./agent/api.py:/app/api.py
      - ./agent/entrypoint.sh:/app/entrypoint.sh
      - ./agent/workspace:/workspace
      - ./crm-cli:/opt/crm-cli
    ports:
      - "8001:8001"
    depends_on:
      - crm-api
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_AGENT_URL: http://localhost:8001
      CRM_API_URL: http://crm-api:8002
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - crm-api
      - agent
    restart: unless-stopped

volumes:
  postgres-data:
  frontend-node-modules:
